name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Repository root files:"
          ls -la
          echo "Finding Android Gradle files:"
          find . -maxdepth 4 -name "settings.gradle" -o -name "settings.gradle.kts" -o -name "build.gradle" -o -name "build.gradle.kts" -o -name "gradlew"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Detect Android project folder
        shell: bash
        run: |
          if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          else
            FOUND_DIR=$(find . -maxdepth 4 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -print -quit | xargs dirname)
            if [ -z "$FOUND_DIR" ]; then
              echo "No settings.gradle or settings.gradle.kts found. Android project files are missing or uploaded in the wrong folder."
              exit 1
            fi
            echo "PROJECT_DIR=$FOUND_DIR" >> $GITHUB_ENV
          fi

      - name: Build debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug --stacktrace
          else
            gradle assembleDebug --stacktrace
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Azkar-TV-Display-Debug-APK
          path: |
            **/build/outputs/apk/debug/*.apk
