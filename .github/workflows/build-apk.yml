name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          echo "Repository root files:"
          ls -la
          echo "Searching Android and Gradle files:"
          find . -maxdepth 6 \( -name "settings.gradle" -o -name "settings.gradle.kts" -o -name "build.gradle" -o -name "build.gradle.kts" -o -name "gradlew" -o -name "gradle-wrapper.properties" \)

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.9 manually
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o gradle-8.9-bin.zip
          unzip -q gradle-8.9-bin.zip
          sudo mkdir -p /opt/gradle
          sudo mv gradle-8.9 /opt/gradle/gradle-8.9
          echo "/opt/gradle/gradle-8.9/bin" >> $GITHUB_PATH
          /opt/gradle/gradle-8.9/bin/gradle --version

      - name: Detect Android project folder
        shell: bash
        run: |
          if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          else
            FOUND_SETTINGS=$(find . -maxdepth 6 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -print -quit)
            if [ -z "$FOUND_SETTINGS" ]; then
              echo "ERROR: No settings.gradle or settings.gradle.kts found."
              echo "Android project files are missing or uploaded inside the wrong folder."
              exit 1
            fi
            FOUND_DIR=$(dirname "$FOUND_SETTINGS")
            echo "PROJECT_DIR=$FOUND_DIR" >> $GITHUB_ENV
          fi

      - name: Build debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          echo "Building APK from: $PWD"
          gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dua-Zikr-Debug-APK
          path: |
            **/build/outputs/apk/debug/*.apk
