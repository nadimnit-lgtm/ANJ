name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.9'

      - name: Check project files
        run: |
          echo "Repository files:"
          ls -la

          echo "Checking Android project structure..."
          if [ ! -f "settings.gradle" ] && [ ! -f "settings.gradle.kts" ]; then
            echo "ERROR: settings.gradle or settings.gradle.kts not found in repository root."
            echo "Make sure the Android project files are uploaded at the repository root."
            exit 1
          fi

      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew not found. Generating Gradle Wrapper..."
            gradle wrapper --gradle-version 8.9 --distribution-type bin
          else
            echo "gradlew already exists."
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Show Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: List APK output
        run: |
          echo "APK files generated:"
          find . -name "*.apk" -type f

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Azkar-TV-Debug-APK
          path: |
            app/build/outputs/apk/debug/*.apk
